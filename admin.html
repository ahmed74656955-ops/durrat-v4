<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة مؤسسة درة العالم</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="./css/enterprise.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-shell">
    <div id="auth-guard" style="position:fixed; inset:0; background:#0f172a; z-index:99999; display:flex; justify-content:center; align-items:center; color:white; font-family:'Tajawal', sans-serif;">
        <h2>جاري التحقق من الصلاحيات...</h2>
    </div>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-globe fa-2x" style="color:#38bdf8; margin-bottom:10px;"></i>
            <h2>درة العالم - الإدارة</h2>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="AdminApp.showSection('dashboard')"><i class="fas fa-chart-line"></i> الرئيسية</div>
            <div class="nav-item" onclick="AdminApp.showSection('branches')"><i class="fas fa-code-branch"></i> الفروع</div>
            <div class="nav-item" onclick="AdminApp.showSection('users')"><i class="fas fa-users-cog"></i> المستخدمين</div>
            <div class="nav-item" onclick="AdminApp.showSection('templates')"><i class="fas fa-file-invoice"></i> قالب الحقول</div>
            <div class="nav-item" onclick="AdminApp.showSection('audit')"><i class="fas fa-history"></i> سجل العمليات</div>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar">
            <h3 id="page-title">الرئيسية</h3>
            <div style="display:flex; gap:15px; align-items:center;">
                <span id="admin-name" style="font-weight:bold;">مدير النظام</span>
                <button class="btn btn-danger" onclick="AuthCore.logout()"><i class="fas fa-sign-out-alt"></i> خروج</button>
                <button class="btn btn-primary" onclick="window.location.href='index.html'"><i class="fas fa-arrow-right"></i> العودة للبوليصة</button>
            </div>
        </header>
        <div class="content-area" id="content-area">
            </div>
    </main>

    <script type="module" src="./js/enterprise/auth-core.js"></script>
    <script type="module" src="./js/enterprise/admin-core.js"></script>
</body>
</html>
