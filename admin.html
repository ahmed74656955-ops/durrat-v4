<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة مؤسسة درة العالم | لوحة التحكم</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="app-version" content="durrat-admin-20260706-final-guard">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="./css/enterprise.css" rel="stylesheet">

    <script>
      window.addEventListener('pageshow', function(event) {
        if (event.persisted) window.location.reload();
      });
    </script>
</head>
<body class="admin-shell dark-theme">
    <div id="auth-guard" class="glass-guard">
        <div class="guard-content">
            <div class="spinner"></div>
            <h2 style="margin-top: 20px; color: var(--primary);">جاري التحقق من الصلاحيات...</h2>
        </div>
    </div>

    <aside class="sidebar glass-panel">
        <div class="sidebar-header">
            <i class="fas fa-chess-king fa-2x" style="color: var(--warning); margin-bottom:10px; filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.5));"></i>
            <h2>الإدارة العليا</h2>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" onclick="AdminApp.showSection('dashboard')"><i class="fas fa-chart-pie"></i> نظرة عامة</div>
            <div class="nav-item" onclick="AdminApp.showSection('branches')"><i class="fas fa-building"></i> إدارة الفروع</div>
            <div class="nav-item" onclick="AdminApp.showSection('users')"><i class="fas fa-users-shield"></i> المستخدمين</div>
            <div class="nav-item" onclick="AdminApp.showSection('templates')"><i class="fas fa-sliders-h"></i> تخصيص الحقول</div>
            <div class="nav-item" onclick="AdminApp.showSection('audit')"><i class="fas fa-history"></i> سجل العمليات</div>
            <div class="nav-item" onclick="AdminApp.showSection('reports')"><i class="fas fa-chart-line"></i> التقارير</div>
            <div class="nav-item" onclick="AdminApp.showSection('permissions')"><i class="fas fa-user-lock"></i> الصلاحيات</div>
            <div class="nav-item" onclick="AdminApp.showSection('backups')"><i class="fas fa-database"></i> النسخ الاحتياطي</div>
            <div class="nav-item" onclick="AdminApp.showSection('security')"><i class="fas fa-shield-halved"></i> الأمان</div>
            <div class="nav-item" onclick="AdminApp.showSection('updates')"><i class="fas fa-bullhorn"></i> التحديثات</div>
            <div class="nav-item" onclick="AdminApp.showSection('delete_requests')"><i class="fas fa-trash-shield"></i> طلبات الحذف</div>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar glass-panel">
            <h3 id="page-title" style="margin: 0; color: var(--text-main); font-weight: 800;">الرئيسية</h3>
            <div style="display:flex; gap:15px; align-items:center;">
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i> <span id="admin-name">المدير</span>
                </div>
                <button class="btn btn-outline" onclick="window.location.replace('index.html?v=' + Date.now())"><i class="fas fa-arrow-right"></i> البوليصة</button>
                <button class="btn btn-danger" onclick="AuthCore.logout()"><i class="fas fa-power-off"></i> خروج</button>
            </div>
        </header>
        <div class="content-area" id="content-area">
            </div>
    </main>

    <script type="module" src="./js/enterprise/auth-core.js"></script>
    <script type="module" src="./js/enterprise/admin-core.js"></script>
</body>
</html>
