<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0, user-scalable=yes">
    <title>إدارة مؤسسة درة العالم | لوحة التحكم</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="app-version" content="durrat-admin-v9.1-lts-real-project">
    <link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet">
    <link href="./css/enterprise.css" rel="stylesheet">

    <script>
      window.addEventListener('pageshow', function(event) {
        if (event.persisted) window.location.reload();
      });
    </script>

<style id="durrat-v75-admin-mobile-css">
@media (max-width: 900px) {
  html, body { max-width:100%; overflow-x:hidden; }
  .admin-shell { display:block !important; }
  .sidebar.glass-panel { position:sticky !important; top:0; width:100% !important; height:auto !important; max-height:none !important; z-index:50; border-radius:0 0 20px 20px !important; }
  .sidebar-header { padding:14px !important; }
  .nav-menu { display:flex !important; gap:10px !important; overflow-x:auto !important; padding:10px 12px 16px !important; -webkit-overflow-scrolling:touch; }
  .nav-item { min-width:160px !important; flex:0 0 auto !important; border-radius:16px !important; justify-content:center; }
  .main-content { width:100% !important; margin:0 !important; padding:10px !important; }
  .topbar.glass-panel { position:sticky; top:0; z-index:45; flex-direction:column !important; gap:12px !important; align-items:stretch !important; }
  .topbar > div { overflow-x:auto; padding-bottom:6px; }
  .content-area { max-height:none !important; overflow:visible !important; padding-bottom:80px !important; }
  table, .admin-table, .data-table { min-width:760px !important; }
  .table-wrapper, .admin-table-wrapper, .fields-table-wrapper { overflow:auto !important; max-height:70dvh !important; -webkit-overflow-scrolling:touch; }
  .ent-modal-box, .modal-content { width:96vw !important; max-width:96vw !important; max-height:88dvh !important; overflow:auto !important; }
}
</style>

</head>
<body class="admin-shell dark-theme">
    <div id="auth-guard" class="glass-guard">
        <div class="guard-content">
            <div class="spinner"></div>
            <h2 style="margin-top: 20px; color: var(--primary);">جاري التحقق من الصلاحيات...</h2>
        </div>
    </div>

    <aside class="sidebar glass-panel">
        <div class="sidebar-header">
            <i class="fas fa-chess-king fa-2x" style="color: var(--warning); margin-bottom:10px; filter: drop-shadow(0 0 10px rgba(245, 158, 11, 0.5));"></i>
            <h2 id="admin-panel-title">الإدارة العليا</h2><small id="admin-panel-subtitle" style="color:var(--text-muted);font-weight:800;">لوحة صلاحيات مركزية</small>
        </div>
        <div class="nav-menu">
            <div class="nav-item active" data-section="dashboard" onclick="AdminApp.showSection('dashboard')"><i class="fas fa-chart-pie"></i> نظرة عامة</div>
            <div class="nav-item" data-section="branches" data-perm="can_manage_branches" onclick="AdminApp.showSection('branches')"><i class="fas fa-building"></i> إدارة الفروع</div>
            <div class="nav-item" data-section="users" data-perm="can_manage_users" onclick="AdminApp.showSection('users')"><i class="fas fa-users-shield"></i> المستخدمين</div>
            <div class="nav-item" data-section="templates" data-perm="can_edit_fields" onclick="AdminApp.showSection('templates')"><i class="fas fa-sliders-h"></i> تخصيص الحقول</div>
            <div class="nav-item" data-section="audit" data-perm="can_view_reports" onclick="AdminApp.showSection('audit')"><i class="fas fa-history"></i> سجل العمليات</div>
            <div class="nav-item" data-section="reports" data-perm="can_view_reports" onclick="AdminApp.showSection('reports')"><i class="fas fa-chart-line"></i> التقارير</div>
            <div class="nav-item" data-section="permissions" data-super-only="1" onclick="AdminApp.showSection('permissions')"><i class="fas fa-user-lock"></i> الصلاحيات</div>
            <div class="nav-item" data-section="backups" data-perm="can_view_reports" onclick="AdminApp.showSection('backups')"><i class="fas fa-database"></i> النسخ الاحتياطي</div>
            <div class="nav-item" data-section="security" data-super-only="1" onclick="AdminApp.showSection('security')"><i class="fas fa-shield-halved"></i> الأمان</div>
            <div class="nav-item" data-section="updates" data-super-only="1" onclick="AdminApp.showSection('updates')"><i class="fas fa-bullhorn"></i> التحديثات</div>
            <div class="nav-item" data-section="delete_requests" data-perm="can_delete_request" onclick="AdminApp.showSection('delete_requests')"><i class="fas fa-trash-shield"></i> طلبات الحذف</div>
        </div>
    </aside>

    <main class="main-content">
        <header class="topbar glass-panel">
            <h3 id="page-title" style="margin: 0; color: var(--text-main); font-weight: 800;">الرئيسية</h3>
            <div style="display:flex; gap:15px; align-items:center;">
                <div class="user-badge">
                    <i class="fas fa-user-circle"></i> <span id="admin-name">المدير</span>
                </div>
                <button class="btn btn-outline" onclick="AdminThemePalette.open()"><i class="fas fa-palette"></i> الألوان</button>
                <button class="btn btn-outline" onclick="window.location.replace('index.html?v=' + Date.now())"><i class="fas fa-arrow-right"></i> البوليصة</button>
                <button class="btn btn-danger" onclick="AuthCore.logout()"><i class="fas fa-power-off"></i> خروج</button>
            </div>
        </header>
        <div class="content-area" id="content-area">
            </div>
    </main>


    <div class="ent-modal-overlay" id="admin-theme-modal">
      <div class="ent-modal-box theme-admin-box">
        <div class="ent-modal-header">
          <h3><i class="fas fa-palette"></i> ألوان لوحة الإدارة</h3>
          <button class="btn btn-outline" onclick="AdminThemePalette.close()"><i class="fas fa-times"></i></button>
        </div>
        <div class="ent-modal-body">
          <p style="color:var(--text-muted);line-height:1.8;margin-bottom:14px;">اختر لون الواجهة. يحفظ الاختيار على جهازك فقط ويمكن تغييره في أي وقت.</p>
          <div id="admin-theme-grid" class="theme-palette-grid"></div>
        </div>
        <div class="ent-modal-footer">
          <button class="btn btn-primary" onclick="AdminThemePalette.save()"><i class="fas fa-save"></i> حفظ</button>
          <button class="btn btn-outline" onclick="AdminThemePalette.reset()"><i class="fas fa-rotate-left"></i> الافتراضي</button>
        </div>
      </div>
    </div>

    <script>
      const AdminThemePalette = {
        key: 'durrat_ui_palette_v7', selected: null,
        palettes: [
          {id:'ocean',name:'الأزرق المحيطي',primary:'#3b82f6',accent:'#10b981',gradient:'linear-gradient(135deg,#1e3a8a,#2563eb,#22d3ee)'},
          {id:'emerald',name:'الأخضر الزمردي',primary:'#059669',accent:'#34d399',gradient:'linear-gradient(135deg,#064e3b,#059669,#5eead4)'},
          {id:'royal',name:'البنفسجي الملكي',primary:'#7c3aed',accent:'#a78bfa',gradient:'linear-gradient(135deg,#312e81,#7c3aed,#ec4899)'},
          {id:'sunset',name:'غروب احترافي',primary:'#ea580c',accent:'#fb7185',gradient:'linear-gradient(135deg,#7c2d12,#ea580c,#f43f5e)'},
          {id:'steel',name:'رمادي تقني',primary:'#475569',accent:'#38bdf8',gradient:'linear-gradient(135deg,#0f172a,#475569,#38bdf8)'},
          {id:'gold',name:'ذهبي إداري',primary:'#b45309',accent:'#f59e0b',gradient:'linear-gradient(135deg,#451a03,#b45309,#facc15)'}
        ],
        apply(id){ const p=this.palettes.find(x=>x.id===id)||this.palettes[0]; this.selected=p.id; document.documentElement.style.setProperty('--primary',p.primary); document.documentElement.style.setProperty('--primary-hover',p.primary); document.documentElement.style.setProperty('--accent',p.accent); document.body?.setAttribute('data-palette',p.id); this.mark(); },
        render(){ const g=document.getElementById('admin-theme-grid'); if(!g)return; g.innerHTML=this.palettes.map(p=>`<button class="theme-card" data-theme-id="${p.id}" onclick="AdminThemePalette.apply('${p.id}')"><span class="theme-swatch" style="background:${p.gradient}"></span><strong>${p.name}</strong><small>لوحة إدارة</small></button>`).join(''); this.mark(); },
        mark(){ document.querySelectorAll('.theme-card').forEach(b=>b.classList.toggle('active', b.dataset.themeId===this.selected)); },
        init(){ this.apply(localStorage.getItem(this.key)||'ocean'); this.render(); }, open(){ this.render(); document.getElementById('admin-theme-modal')?.classList.add('active'); }, close(){ document.getElementById('admin-theme-modal')?.classList.remove('active'); }, save(){ localStorage.setItem(this.key,this.selected||'ocean'); this.close(); }, reset(){ localStorage.removeItem(this.key); this.apply('ocean'); this.save(); }
      };
      document.addEventListener('DOMContentLoaded',()=>AdminThemePalette.init());
    </script>

    <script type="module" src="./js/enterprise/auth-core.js"></script>
    <script type="module" src="./js/enterprise/admin-core.js"></script>

<script id="durrat-v76-admin-live-guard">
(function(){
  async function checkAdminLive(){
    try{
      const session = JSON.parse(localStorage.getItem('enterprise_session') || '{}');
      const username = session?.user?.username;
      if(!username || !window.supabase) return;
      const { data, error } = await window.supabase.rpc('get_user_live_status', { p_username: username });
      if(error || !data) return;
      if(data.active === false || data.branch_active === false || data.success === false){
        alert(data.error || 'تم إيقاف حسابك أو فرعك من الإدارة الرئيسية');
        localStorage.removeItem('enterprise_session');
        localStorage.removeItem('waybill_active_user');
        window.location.replace('index.html?blocked=1&v=' + Date.now());
        return;
      }
    }catch(e){}
  }
  window.addEventListener('focus', checkAdminLive);
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(checkAdminLive, 1200); setInterval(checkAdminLive, 12000); });
})();
</script>
</body>
</html>
